<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blur Event</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Achtergrondvideo -->
<video autoplay muted loop playsinline class="bg-video">
    <source src="assets/video/desktop.mp4" type="video/mp4">
    <source src="assets/video/mobile.mp4" type="video/mp4">
</video>

<!-- Content -->
<div class="content">
    <img src="assets/images/logo.png" class="logo" alt="Blur Event logo">
    <img src="assets/images/aankondiging.png" class="event" alt="Event aankondiging">

    <!-- Knop + call image in wrapper -->
    <div class="alertWrapper">
        <button type="button" class="alertButton" onclick="openForm()">
            BLUR ALERT
        </button>
        <img src="assets/images/call.png" alt="Call text" class="callImage">
    </div>
</div>

<!-- Popup -->
<div class="popup" id="popup">
    <div class="popupContent">
        <h2>BLUR ALERT</h2>
        <form id="notifyForm">
            <!-- Honeypot anti-bot veld -->
            <input type="text" name="website" style="display:none">

            <!-- User input velden -->
            <input type="email" name="email" placeholder="Email" required>
            <input type="tel" name="phone" placeholder="Phone" required>

            <button type="submit" class="submit">Notify me</button>
        </form>
        <button class="close" onclick="closeForm()">Close</button>
        <div id="successMessage" style="margin-top:10px; color:green;"></div>
    </div>
</div>

<!-- Footer -->
<footer>
    <a href="https://www.instagram.com/blur_event/?g=5" target="_blank" rel="noopener">
        @blur_event
    </a>
</footer>

<script>
// Popup open/close
function openForm(){
    document.getElementById('popup').style.display='flex';
}
function closeForm(){
    document.getElementById('popup').style.display='none';
}

// Form submit
document.getElementById('notifyForm').addEventListener('submit', function(e){
    e.preventDefault();

    const form = e.target;
    const formData = new FormData(form);

    // Verstuur naar send.php
    fetch('send.php', {
        method: 'POST',
        body: formData
    })
    .then(response=>response.text())
    .then(data=>{
        document.getElementById('successMessage').innerText = "Registratie gelukt!";
        form.reset();
    })
    .catch(error=>{
        document.getElementById('successMessage').innerText = "Er is iets misgegaan.";
        console.error(error);
    });
});
</script>

<script src="script.js"></script>
</body>
</html>
