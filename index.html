<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blur Event</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

<style>
/* Popup achtergrond overlay */
.popup {
  display: none; /* standaard verborgen */
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0,0,0,0.7);
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

/* Popup content box */
.popupContent {
  background-color: #fff;
  padding: 20px;
  max-width: 500px;
  width: 90%;
  border-radius: 10px;
  position: relative;
}

/* Close knop */
.popupContent .close {
  position: absolute;
  top: 10px;
  right: 15px;
  background: #f00;
  color: #fff;
  border: none;
  padding: 5px 10px;
  cursor: pointer;
  border-radius: 5px;
}

/* Achtergrond video styling */
.bg-video {
  position: fixed;
  right: 0;
  bottom: 0;
  min-width: 100%;
  min-height: 100%;
  object-fit: cover;
  z-index: -1;
}

/* Content styling */
.content {
  text-align: center;
  position: relative;
  z-index: 1;
  margin-top: 50px;
}

.logo {
  max-width: 200px;
  margin-bottom: 20px;
}

.event {
  max-width: 300px;
  margin-bottom: 30px;
}

.alertWrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.alertButton {
  background-color: #ff0000;
  color: #fff;
  padding: 12px 25px;
  font-size: 18px;
  border: none;
  cursor: pointer;
  border-radius: 8px;
  margin-bottom: 10px;
}

.callImage {
  max-width: 150px;
}

/* Footer styling */
footer {
  text-align: center;
  margin-top: 50px;
  font-size: 14px;
}
</style>

</head>
<body>

<!-- Achtergrondvideo -->
<video autoplay muted loop playsinline class="bg-video">
    <source src="assets/video/desktop.mp4" type="video/mp4">
    <source src="assets/video/mobile.mp4" type="video/mp4">
</video>

<!-- Content -->
<div class="content">
    <img src="assets/images/logo.png" class="logo" alt="Blur Event logo">
    <img src="assets/images/aankondiging.png" class="event" alt="Event aankondiging">

    <!-- Knop + call image in wrapper -->
    <div class="alertWrapper">
        <button type="button" class="alertButton" onclick="openForm()">
            BLUR ALERT
        </button>
        <img src="assets/images/call.png" alt="Call text" class="callImage">
    </div>
</div>

<!-- Popup -->
<div class="popup" id="popup">
    <div class="popupContent">
        <h2>BLUR ALERT</h2>

        <!-- iFrame embed formulier -->
        <iframe
            src="https://app.relationcity.io/forms/69ce9744ef9a9fdb6264db61?embed=1"
            style="width:100%;height:500px;border:none;"
            title="Blur Event Form"
        ></iframe>

        <button class="close" onclick="closeForm()">Close</button>
    </div>
</div>

<!-- Footer -->
<footer>
    <a href="https://www.instagram.com/blur_event/?g=5" target="_blank" rel="noopener">
        @blur_event
    </a>
</footer>

<!-- Script voor popup -->
<script>
function openForm() {
    document.getElementById("popup").style.display = "flex"; // flex voor centrering
}

function closeForm() {
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
