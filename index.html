<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Blur Event</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Fullscreen video + overlay -->
  <div class="overlay"></div>
  <div class="video-container">
    <video autoplay muted loop playsinline id="bgVideo">
      <source src="assets/video/desktop.mp4" type="video/mp4">
      Your browser does not support HTML5 video.
    </video>
  </div>

  <!-- Centraal gecentreerde content -->
  <div class="content">
    <img src="assets/images/logo.png" class="logo" alt="Logo">
    <img src="assets/images/aankondiging.png" class="event" alt="Next Event">
    <button class="alertButton" onclick="openForm()">SUN ALERT</button>
  </div>

  <!-- Popup form -->
  <div class="popup" id="popup">
    <div class="popupContent">
      <h2>SUN ALERT</h2>
      <input type="email" placeholder="Email">
      <input type="text" placeholder="Phone">
      <button class="submit">Notify me</button>
      <button class="close" onclick="closeForm()">Close</button>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <a href="https://www.instagram.com/blur_event/?g=5" target="_blank">Instagram</a>
  </footer>

  <!-- Scripts -->
  <script src="script.js"></script>
</body>
</html>
