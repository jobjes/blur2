<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blur Event</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Achtergrondvideo -->
<video autoplay muted loop playsinline class="bg-video">
    <source src="assets/video/desktop.mp4" type="video/mp4">
    <source src="assets/video/mobile.mp4" type="video/mp4">
</video>

<!-- Content -->
<div class="content">
    <img src="assets/images/logo.png" class="logo" alt="Blur Event logo">
    <img src="assets/images/aankondiging.png" class="event" alt="Event aankondiging">

    <!-- Knop + call image in wrapper -->
    <div class="alertWrapper">
        <button type="button" class="alertButton" id="blurButton">
            BLUR ALERT
        </button>
        <img src="assets/images/call.png" alt="Call text" class="callImage">
    </div>
</div>

<!-- Popup -->
<div class="popup" id="popup">
    <div class="popupContent">
        <h2>BLUR ALERT</h2>

        <!-- iFrame embed formulier -->
        <iframe
            src="https://app.relationcity.io/forms/69ce9744ef9a9fdb6264db61?embed=1"
            style="width:100%;height:500px;border:none;"
            title="Blur Event Form"
        ></iframe>

        <button class="close" id="popupClose">Close</button>
    </div>
</div>

<!-- Footer -->
<footer>
    <a href="https://www.instagram.com/blur_event/?g=5" target="_blank" rel="noopener">
        @blur_event
    </a>
</footer>

<!-- Script -->
<script src="script.js"></script>

</body>
</html>
