<!DOCTYPE html>

<html lang="nl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blur Event</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

</head>


<body>


<video autoplay muted loop playsinline class="bg-video">

<source src="assets/video/desktop.mp4" type="video/mp4">

<source src="assets/video/mobile.mp4" type="video/mp4">

</video>



<div class="content">

<img src="assets/images/logo.png" class="logo">

<img src="assets/images/aankondiging.png" class="event">

<button class="alertButton" onclick="openForm()">

SUN ALERT

</button>

</div>



<div class="popup" id="popup">

<div class="popupContent">

<h2>SUN ALERT</h2>

<form id="notifyForm">

<input type="email" placeholder="Email" required>

<input type="text" placeholder="Phone">

<button class="submit">

Notify me

</button>

</form>

<button class="close" onclick="closeForm()">

Close

</button>

<div id="successMessage"></div>

</div>

</div>



<footer>

<a href="https://www.instagram.com/blur_event/?g=5" target="_blank">

@blur_event

</a>

</footer>


<script src="script.js"></script>

</body>

</html>
