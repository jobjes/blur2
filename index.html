<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Blur Event</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="fullscreen-wrapper">
  <video autoplay muted loop playsinline class="bg-video" poster="assets/images/poster.jpg">
    <source src="assets/video/desktop.mp4" media="(min-width:768px)">
    <source src="assets/video/mobile.mp4">
  </video>

  <div class="content">
    <img src="assets/images/logo.png" class="logo" alt="Logo">
    <img src="assets/images/aankondiging.png" class="event" alt="Next Event">
    <button class="alertButton" onclick="openForm()">SUN ALERT</button>
  </div>
</div>

<div class="popup" id="popup">
  <div class="popupContent">
    <h2>SUN ALERT</h2>
    <form id="notifyForm">
      <input type="email" name="email" placeholder="Email" required>
      <input type="tel" name="phone" placeholder="Phone">
      <button class="submit">Notify me</button>
    </form>
    <button class="close" onclick="closeForm()">Close</button>
    <div id="successMessage"></div>
  </div>
</div>

<footer>
  <a href="https://www.instagram.com/blur_event/?g=5" target="_blank">@blur_event</a>
</footer>

<script src="script.js"></script>
</body>
</html>
